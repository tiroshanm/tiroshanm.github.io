<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medium Articles | Dr. Tiroshan Madushanka</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --white: #ffffff;
            --off-white: #f8f8f8;
            --cream: #f5f5f5;
            --light-gray: #e8e8e6;
            --medium-gray: #999999;
            --dark-gray: #4a4a4a;
            --charcoal: #2a2a2a;
            --black: #1a1a1a;
            --accent: #8b7355;
            --accent-light: #c4b5a0;
            --accent-subtle: rgba(139, 115, 85, 0.08);
            --accent-glow: rgba(139, 115, 85, 0.15);
            --border: rgba(0, 0, 0, 0.06);
            --border-hover: rgba(139, 115, 85, 0.4);
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.04);
            --shadow-lg: 0 10px 40px rgba(0, 0, 0, 0.08);
            --font-serif: 'Cormorant Garamond', Georgia, serif;
            --font-sans: 'Source Sans 3', -apple-system, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            font-family: var(--font-sans);
            background: var(--off-white);
            color: var(--charcoal);
            line-height: 1.7;
            font-weight: 300;
        }

        ::selection { background: var(--accent-light); color: var(--black); }

        .container { max-width: 1280px; margin: 0 auto; padding: 0 4rem; }

        /* Navigation */
        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            padding: 1.5rem 4rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(248, 248, 248, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid transparent;
            transition: all 0.4s ease;
        }

        nav.scrolled { border-bottom: 1px solid var(--light-gray); padding: 1rem 4rem; }

        .logo {
            font-family: var(--font-serif);
            font-size: 1.4rem;
            font-weight: 400;
            letter-spacing: 0.02em;
            color: var(--black);
            text-decoration: none;
        }
        .logo span { color: var(--accent); }

        .nav-links { display: flex; gap: 3rem; list-style: none; }
        .nav-links a {
            text-decoration: none;
            color: var(--dark-gray);
            font-size: 0.85rem;
            font-weight: 400;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            position: relative;
            transition: color 0.3s ease;
        }
        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -4px; left: 0;
            width: 0; height: 1px;
            background: var(--accent);
            transition: width 0.3s ease;
        }
        .nav-links a:hover { color: var(--black); }
        .nav-links a:hover::after { width: 100%; }

        /* Main Content */
        .main-content { padding-top: 120px; padding-bottom: 60px; min-height: 100vh; }

        /* Section Header */
        .section-header {
            display: flex;
            align-items: baseline;
            gap: 2rem;
            margin-bottom: 2.5rem;
        }
        .section-label {
            font-size: 0.7rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--accent);
            font-weight: 500;
        }
        .section-title {
            font-family: var(--font-serif);
            font-size: clamp(1.6rem, 3vw, 2.2rem);
            font-weight: 300;
            color: var(--black);
        }
        .section-title em { font-style: italic; color: var(--accent); }
        .section-count {
            font-size: 0.85rem;
            color: var(--medium-gray);
            padding: 0.25rem 0.75rem;
            background: var(--cream);
            border-radius: 100px;
        }
        .section-line {
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, var(--light-gray) 0%, transparent 100%);
        }

        /* Filter Tabs */
        .filter-tabs {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 2.5rem;
            flex-wrap: wrap;
        }
        .filter-tab {
            background: none;
            border: none;
            font-family: var(--font-sans);
            font-size: 0.75rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--medium-gray);
            cursor: pointer;
            padding: 0.5rem 1rem;
            border-radius: 100px;
            transition: all 0.3s ease;
        }
        .filter-tab:hover { color: var(--black); background: var(--cream); }
        .filter-tab.active { color: var(--white); background: var(--accent); }

        /* Articles Grid */
        .articles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 2rem;
        }
        .article-card {
            background: var(--white);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--light-gray);
            box-shadow: var(--shadow-sm);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            animation: cardReveal 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            opacity: 0;
            transform: translateY(30px);
        }
        @keyframes cardReveal { to { opacity: 1; transform: translateY(0); } }
        .article-card:hover {
            border-color: var(--border-hover);
            transform: translateY(-8px);
            box-shadow: var(--shadow-lg);
        }

        .thumbnail-wrapper { overflow: hidden; height: 200px; position: relative; }
        .thumbnail-wrapper::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 60px;
            background: linear-gradient(to top, var(--white) 0%, transparent 100%);
            pointer-events: none;
        }
        .article-thumbnail {
            width: 100%; height: 200px;
            object-fit: cover;
            transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .article-card:hover .article-thumbnail { transform: scale(1.05); }

        .thumbnail-placeholder {
            width: 100%; height: 200px;
            background: linear-gradient(135deg, var(--cream) 0%, var(--light-gray) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .thumbnail-placeholder svg { width: 48px; height: 48px; color: var(--accent); opacity: 0.3; }

        .article-content { padding: 1.5rem 1.75rem 1.75rem; }
        .article-category {
            display: inline-block;
            padding: 0.3rem 0.8rem;
            background: var(--accent-subtle);
            color: var(--accent);
            font-size: 0.65rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            border-radius: 100px;
            margin-bottom: 0.75rem;
        }
        .article-title {
            font-family: var(--font-serif);
            font-size: 1.25rem;
            font-weight: 400;
            line-height: 1.35;
            margin-bottom: 0.5rem;
            color: var(--black);
            transition: color 0.3s ease;
        }
        .article-card:hover .article-title { color: var(--accent); }
        .article-excerpt {
            color: var(--dark-gray);
            font-size: 0.9rem;
            line-height: 1.7;
            margin-bottom: 1rem;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .article-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 1rem;
            border-top: 1px solid var(--light-gray);
        }
        .article-date { color: var(--medium-gray); font-size: 0.78rem; }
        .read-more {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--accent);
            font-size: 0.8rem;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        .read-more:hover { gap: 0.75rem; }
        .read-more svg { width: 14px; height: 14px; transition: transform 0.3s ease; }
        .article-card:hover .read-more svg { transform: translateX(4px); }

        /* Pagination */
        .pagination { display: flex; justify-content: center; align-items: center; gap: 0.5rem; margin-top: 3rem; flex-wrap: wrap; }
        .pagination-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 40px; height: 40px;
            padding: 0 0.75rem;
            border-radius: 10px;
            border: 1px solid var(--light-gray);
            background: var(--white);
            color: var(--dark-gray);
            font-family: var(--font-sans);
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .pagination-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); background: var(--accent-subtle); }
        .pagination-btn.active { background: var(--accent); border-color: var(--accent); color: var(--white); font-weight: 500; }
        .pagination-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .pagination-btn svg { width: 16px; height: 16px; }
        .pagination-info { color: var(--medium-gray); font-size: 0.8rem; margin: 0 0.75rem; }

        /* View All */
        .view-all-container {
            text-align: center;
            margin-top: 2.5rem;
            padding: 1.5rem 2rem;
            background: var(--cream);
            border-radius: 16px;
        }
        .view-all-text {
            color: var(--dark-gray);
            font-size: 0.85rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .view-all-text svg { width: 16px; height: 16px; color: var(--accent); }
        .view-all-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            background: transparent;
            color: var(--accent);
            border: 1px solid var(--accent);
            border-radius: 100px;
            font-family: var(--font-sans);
            font-size: 0.85rem;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .view-all-btn:hover {
            background: var(--accent);
            color: var(--white);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(139, 115, 85, 0.25);
        }
        .view-all-btn svg { width: 16px; height: 16px; transition: transform 0.3s ease; }
        .view-all-btn:hover svg { transform: translateX(3px); }

        /* Loading & Error States */
        .loading-container { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 5rem 2rem; gap: 1.5rem; }
        .loading-spinner { width: 48px; height: 48px; border: 2px solid var(--light-gray); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { color: var(--dark-gray); font-size: 0.95rem; }

        .error-container { text-align: center; padding: 4rem 2rem; background: var(--white); border-radius: 20px; border: 1px solid var(--light-gray); max-width: 500px; margin: 0 auto; }
        .error-icon { width: 64px; height: 64px; color: var(--accent); opacity: 0.5; margin-bottom: 1.5rem; }
        .error-title { font-family: var(--font-serif); font-size: 1.5rem; margin-bottom: 0.5rem; color: var(--black); font-weight: 400; }
        .error-message { color: var(--dark-gray); margin-bottom: 1.5rem; font-size: 0.9rem; }
        .retry-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            background: var(--accent);
            color: var(--white);
            border: none;
            border-radius: 100px;
            font-family: var(--font-sans);
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.4s ease;
        }
        .retry-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(139, 115, 85, 0.3); }

        .empty-state { text-align: center; padding: 4rem 2rem; background: var(--white); border-radius: 20px; border: 1px solid var(--light-gray); }
        .empty-state svg { width: 72px; height: 72px; color: var(--medium-gray); margin-bottom: 1.5rem; }
        .empty-state h3 { font-family: var(--font-serif); font-size: 1.4rem; margin-bottom: 0.5rem; color: var(--black); font-weight: 400; }
        .empty-state p { color: var(--dark-gray); font-size: 0.9rem; }

        .api-status { font-size: 0.7rem; color: var(--medium-gray); font-family: 'SF Mono', Consolas, monospace; }

        /* Footer */
        footer { padding: 2rem 4rem; text-align: center; border-top: 1px solid var(--light-gray); background: var(--cream); }
        .footer-text { color: var(--medium-gray); font-size: 0.8rem; }
        .footer-text a { color: var(--accent); text-decoration: none; transition: color 0.3s ease; }
        .footer-text a:hover { color: var(--black); }

        /* Scroll Progress */
        .scroll-progress { position: fixed; top: 0; left: 0; height: 2px; background: var(--accent); z-index: 1001; transition: width 0.1s ease; }

        /* Responsive */
        @media (max-width: 1024px) { .container { padding: 0 3rem; } nav { padding: 1rem 3rem; } }
        @media (max-width: 768px) {
            .container { padding: 0 1.5rem; }
            nav { padding: 1rem 1.5rem; }
            .nav-links { display: none; }
            .main-content { padding-top: 100px; }
            .articles-grid { grid-template-columns: 1fr; }
            footer { padding: 1.5rem 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="scroll-progress" id="scrollProgress"></div>

    <nav id="navbar">
        <a href="index.html" class="logo">T.<span>Madushanka</span></a>
        <ul class="nav-links">
            <li><a href="index.html#about">About</a></li>
            <li><a href="index.html#publications">Publications</a></li>
            <li><a href="index.html#experience">Experience</a></li>
            <li><a href="#">Medium</a></li>
            <li><a href="index.html#contact">Contact</a></li>
        </ul>
    </nav>

    <main class="main-content">
        <div class="container">
            <div class="section-header">
                <span class="section-label">Writing</span>
                <h2 class="section-title">Latest <em>Articles</em></h2>
                <span class="section-count" id="articleCount">—</span>
                <div class="section-line"></div>
            </div>

            <div class="filter-tabs" id="filterTabs">
                <button class="filter-tab active" data-filter="all">All</button>
            </div>

            <div id="articlesContainer">
                <div class="loading-container">
                    <div class="loading-spinner"></div>
                    <p class="loading-text">Fetching latest articles from Medium...</p>
                    <p class="api-status" id="apiStatus">Initializing...</p>
                </div>
            </div>

            <div id="paginationContainer"></div>
            <div id="viewAllContainer"></div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p class="footer-text">
                © 2025 <a href="https://tiroshanm.github.io/">Tiroshan Madushanka</a> · 
                Dynamically fetched from <a href="https://medium.com/@tiroshanm" target="_blank">Medium</a>
            </p>
        </div>
    </footer>

    <script>
        window.addEventListener('scroll', () => {
            const scrollProgress = document.getElementById('scrollProgress');
            const scrollTop = window.scrollY;
            const docHeight = document.documentElement.scrollHeight - window.innerHeight;
            scrollProgress.style.width = (scrollTop / docHeight) * 100 + '%';
            document.getElementById('navbar').classList.toggle('scrolled', scrollTop > 50);
        });

        const MEDIUM_USERNAME = 'tiroshanm';
        const MEDIUM_FEED_URL = `https://medium.com/feed/@${MEDIUM_USERNAME}`;
        const ARTICLES_PER_PAGE = 6;
        
        const CORS_PROXIES = [
            { name: 'RSS2JSON', url: `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(MEDIUM_FEED_URL)}`, parseResponse: (data) => data.status === 'ok' && data.items ? { feed: data.feed, items: data.items } : null },
            { name: 'AllOrigins', url: `https://api.allorigins.win/get?url=${encodeURIComponent(MEDIUM_FEED_URL)}`, parseResponse: (data) => data.contents ? parseRSSXML(data.contents) : null },
            { name: 'CORSProxy.io', url: `https://corsproxy.io/?${encodeURIComponent(MEDIUM_FEED_URL)}`, parseResponse: (text) => parseRSSXML(text), isText: true }
        ];

        let allArticles = [], filteredArticles = [], currentPage = 1, currentFilter = 'all';

        function parseRSSXML(xmlString) {
            try {
                const doc = new DOMParser().parseFromString(xmlString, 'text/xml');
                if (doc.querySelector('parsererror')) return null;
                const channel = doc.querySelector('channel');
                if (!channel) return null;
                const feed = { title: channel.querySelector('title')?.textContent || '', description: channel.querySelector('description')?.textContent || '' };
                const items = Array.from(doc.querySelectorAll('item')).map(item => {
                    const content = item.querySelector('content\\:encoded, encoded')?.textContent || item.querySelector('description')?.textContent || '';
                    return { title: item.querySelector('title')?.textContent || '', link: item.querySelector('link')?.textContent || '', pubDate: item.querySelector('pubDate')?.textContent || '', description: item.querySelector('description')?.textContent || '', content, thumbnail: extractAllImages(content)[0] || null, categories: Array.from(item.querySelectorAll('category')).map(c => c.textContent) };
                });
                return { feed, items };
            } catch { return null; }
        }

        function extractAllImages(content) {
            if (!content) return [];
            const images = [];
            [/<img[^>]+src=["']([^"']+)["']/gi, /https:\/\/cdn-images-\d+\.medium\.com\/[^\s"'<>]+/gi, /https:\/\/miro\.medium\.com\/[^\s"'<>]+/gi].forEach(pattern => {
                let match;
                while ((match = pattern.exec(content)) !== null) {
                    const url = match[1] || match[0];
                    if (url && !images.includes(url) && !url.includes('stat?event')) images.push(url);
                }
            });
            return images;
        }

        function getBestImage(content, thumbnail) {
            const imgs = extractAllImages(content);
            const hq = imgs.filter(img => img.includes('max/') || img.includes('fit/') || !img.includes('/resize:'));
            return hq[0] || imgs[0] || thumbnail || null;
        }

        function stripHtml(html) { const tmp = document.createElement('div'); tmp.innerHTML = html; return tmp.textContent || ''; }

        function getCategoriesFromContent(title, content, tags = []) {
            const text = (title + ' ' + content + ' ' + tags.join(' ')).toLowerCase();
            const categories = [];
            if (text.match(/machine learning|ml|neural|deep learning|tensorflow|pytorch|ai|artificial intelligence|llm|gpt|transformer/)) categories.push('ml');
            if (text.match(/kubernetes|k8s|docker|aws|gcp|azure|cloud|devops|container|microservice/)) categories.push('cloud');
            if (text.match(/python|javascript|java|api|database|software|engineering|code|programming|mcp|agent/)) categories.push('tech');
            if (text.match(/data|analytics|statistics|visualization|pandas|spark/)) categories.push('data');
            return categories.length ? categories : ['tech'];
        }

        async function fetchArticles() {
            for (let i = 0; i < CORS_PROXIES.length; i++) {
                const proxy = CORS_PROXIES[i];
                updateApiStatus(`Trying ${proxy.name} (${i + 1}/${CORS_PROXIES.length})...`);
                try {
                    const response = await fetch(proxy.url);
                    if (!response.ok) continue;
                    const data = proxy.isText ? await response.text() : await response.json();
                    const result = proxy.parseResponse(data);
                    if (result?.items?.length > 0) {
                        allArticles = result.items.map(item => ({
                            title: item.title, link: item.link, pubDate: item.pubDate,
                            description: stripHtml(item.description || item.content || '').substring(0, 250),
                            categories: getCategoriesFromContent(item.title, (item.description || '') + ' ' + (item.content || ''), item.categories || []),
                            thumbnail: getBestImage(item.content || item.description, item.thumbnail)
                        }));
                        filteredArticles = [...allArticles];
                        return true;
                    }
                } catch (e) { console.log(`${proxy.name} failed:`, e.message); }
            }
            return false;
        }

        function updateApiStatus(msg) { const el = document.getElementById('apiStatus'); if (el) el.textContent = msg; }

        function generateFilterTabs() {
            const cats = new Set();
            allArticles.forEach(a => a.categories.forEach(c => cats.add(c)));
            const labels = { tech: 'Technology', ml: 'AI & ML', cloud: 'Cloud & DevOps', data: 'Data Science' };
            const container = document.getElementById('filterTabs');
            container.innerHTML = '<button class="filter-tab active" data-filter="all">All</button>';
            cats.forEach(cat => container.innerHTML += `<button class="filter-tab" data-filter="${cat}">${labels[cat] || cat}</button>`);
            setupFilters();
        }

        function getCategoryLabel(cat) { return { tech: 'Technology', ml: 'AI & ML', cloud: 'Cloud & DevOps', data: 'Data Science' }[cat] || 'Article'; }
        function getPaginatedArticles() { return filteredArticles.slice((currentPage - 1) * ARTICLES_PER_PAGE, currentPage * ARTICLES_PER_PAGE); }
        function getTotalPages() { return Math.ceil(filteredArticles.length / ARTICLES_PER_PAGE); }

        function renderArticles() {
            const container = document.getElementById('articlesContainer');
            const articles = getPaginatedArticles();
            document.getElementById('articleCount').textContent = `${filteredArticles.length} articles`;

            if (!filteredArticles.length) {
                container.innerHTML = `<div class="empty-state"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg><h3>No articles found</h3><p>No articles match the selected filter.</p></div>`;
                document.getElementById('paginationContainer').innerHTML = '';
                return;
            }

            container.innerHTML = `<div class="articles-grid">${articles.map((a, i) => `
                <article class="article-card" style="animation-delay: ${i * 0.1}s">
                    <div class="thumbnail-wrapper">${a.thumbnail ? `<img src="${a.thumbnail}" alt="${a.title}" class="article-thumbnail" onerror="this.onerror=null; this.parentElement.innerHTML = getPlaceholderHTML();">` : getPlaceholderHTML()}</div>
                    <div class="article-content">
                        <span class="article-category">${getCategoryLabel(a.categories[0])}</span>
                        <h3 class="article-title">${a.title}</h3>
                        <p class="article-excerpt">${a.description}...</p>
                        <div class="article-meta">
                            <span class="article-date">${formatDate(a.pubDate)}</span>
                            <a href="${a.link}" target="_blank" class="read-more">Read Article<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"/></svg></a>
                        </div>
                    </div>
                </article>`).join('')}</div>`;
            renderPagination();
            renderViewAll();
        }

        function renderPagination() {
            const totalPages = getTotalPages();
            const container = document.getElementById('paginationContainer');
            if (totalPages <= 1) { container.innerHTML = ''; return; }
            let html = '<div class="pagination">';
            html += `<button class="pagination-btn" onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg></button>`;
            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= currentPage - 1 && i <= currentPage + 1)) {
                    html += `<button class="pagination-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
                } else if (i === currentPage - 2 || i === currentPage + 2) html += '<span class="pagination-info">...</span>';
            }
            html += `<button class="pagination-btn" onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg></button></div>`;
            html += `<p class="pagination-info" style="text-align: center; margin-top: 1.25rem;">Showing ${(currentPage - 1) * ARTICLES_PER_PAGE + 1}–${Math.min(currentPage * ARTICLES_PER_PAGE, filteredArticles.length)} of ${filteredArticles.length}</p>`;
            container.innerHTML = html;
        }

        function renderViewAll() {
            document.getElementById('viewAllContainer').innerHTML = `<div class="view-all-container"><p class="view-all-text"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>Medium's RSS feed provides the 10 most recent articles.</p><a href="https://medium.com/@${MEDIUM_USERNAME}" target="_blank" class="view-all-btn">View All on Medium<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg></a></div>`;
        }

        function goToPage(page) {
            if (page < 1 || page > getTotalPages()) return;
            currentPage = page;
            renderArticles();
            document.getElementById('articlesContainer').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function getPlaceholderHTML() { return `<div class="thumbnail-placeholder"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg></div>`; }

        function formatDate(dateStr) {
            try { const d = new Date(dateStr); return isNaN(d.getTime()) ? 'Unknown date' : d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' }); }
            catch { return 'Unknown date'; }
        }

        function renderError() {
            document.getElementById('articleCount').textContent = '—';
            document.getElementById('articlesContainer').innerHTML = `<div class="error-container"><svg class="error-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg><h3 class="error-title">Unable to Load Articles</h3><p class="error-message">Could not fetch articles from Medium.</p><button class="retry-btn" onclick="init()"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>Try Again</button><p style="margin-top: 1.5rem; font-size: 0.85rem; color: var(--dark-gray);">Visit directly: <a href="https://medium.com/@${MEDIUM_USERNAME}" target="_blank" style="color: var(--accent); font-weight: 500;">medium.com/@${MEDIUM_USERNAME}</a></p></div>`;
        }

        function setupFilters() {
            document.querySelectorAll('.filter-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    currentFilter = tab.dataset.filter;
                    currentPage = 1;
                    filteredArticles = currentFilter === 'all' ? [...allArticles] : allArticles.filter(a => a.categories.includes(currentFilter));
                    renderArticles();
                });
            });
        }

        async function init() {
            document.getElementById('articlesContainer').innerHTML = `<div class="loading-container"><div class="loading-spinner"></div><p class="loading-text">Fetching latest articles from Medium...</p><p class="api-status" id="apiStatus">Initializing...</p></div>`;
            document.getElementById('paginationContainer').innerHTML = '';
            document.getElementById('viewAllContainer').innerHTML = '';
            const success = await fetchArticles();
            if (success && allArticles.length) { generateFilterTabs(); renderArticles(); }
            else renderError();
        }

        window.goToPage = goToPage;
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
